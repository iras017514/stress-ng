- name: Compile stress-ng for Android
        run: |
          # 自动查找 NDK 中 clang 的位置，避免写死路径
          # ANDROID_NDK_LATEST_HOME 是 GitHub Actions 预设的指向最新安装 NDK 的变量
          NDK_PATH=$ANDROID_NDK_LATEST_HOME
          
          # 查找 aarch64 交叉编译器的具体路径
          CLANG_PATH=$(find $NDK_PATH -name "aarch64-linux-android30-clang" | head -n 1)
          
          if [ -z "$CLANG_PATH" ]; then
            echo "错误: 找不到 aarch64-linux-android30-clang"
            exit 1
          fi
          
          export CC=$CLANG_PATH
          echo "使用编译器路径: $CC"
          
          make clean
          # 增加静态编译参数并忽略一些非关键的编译错误（stress-ng 源码很大）
          make CC="$CC" STATIC=1 -j$(nproc)
