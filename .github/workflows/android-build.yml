name: Android CI

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up NDK
        uses: android-actions/setup-android@v3
        with:
          # 我们指定安装这个版本，确保它一定存在
          ndk-version: '26.1.10909125'

      - name: Compile stress-ng for Android
        run: |
          echo "正在全盘搜索 NDK 编译器，请稍候..."
          
          # 直接在系统预设的几个目录下查找编译器
          # 这样可以彻底解决环境变量 $ANDROID_SDK_ROOT 指向不准的问题
          CLANG_PATH=$(find /usr/local/lib/android /home/runner/work -name "aarch64-linux-android30-clang" -type f | head -n 1)
          
          if [ -z "$CLANG_PATH" ]; then
            echo "错误: 依然找不到编译器。尝试列出目录结构进行调试："
            ls -R /usr/local/lib/android/sdk/ndk || echo "目录不存在"
            exit 1
          fi
          
          export CC="$CLANG_PATH"
          echo "成功找到编译器: $CC"

          # 开始编译
          make clean
          # 强制静态编译，-j$(nproc) 加速
          make CC="$CC" STATIC=1 -j$(nproc)

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: stress-ng-android-aarch64
          path: stress-ng
