name: Android CI

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 使用官方提供的 setup-android
      - name: Set up NDK
        uses: android-actions/setup-android@v3
        with:
          # 我们只需要 NDK，这里指定版本
          ndk-version: '26.1.10909125' 

      - name: Compile stress-ng for Android
        run: |
          # 官方 Action 的 NDK 路径通常在 $ANDROID_SDK_ROOT/ndk/<version>
          # 我们直接利用通配符定位编译器路径
          NDK_PATH=$ANDROID_SDK_ROOT/ndk/26.1.10909125
          export CC=$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android30-clang
          
          echo "Using Compiler: $CC"
          
          make clean
          # 强制静态编译，确保生成的二进制文件在车机上能独立运行
          make CC="$CC" STATIC=1 -j$(nproc)

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: stress-ng-android-aarch64
          path: stress-ng
