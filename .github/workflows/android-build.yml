name: Android CI

on:
  workflow_dispatch: # 允许手动点击按钮触发编译

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up NDK
        uses: android-actions/setup-android@v3
        with:
          # 使用一个稳定的 NDK 版本
          ndk-version: '26.1.10909125'

      - name: Compile stress-ng for Android
        run: |
          # 1. 自动探测 NDK 路径（避免写死路径导致的 Not Found 错误）
          # GitHub Actions 默认将 NDK 安装在 $ANDROID_SDK_ROOT/ndk/ 下
          NDK_PATH=$(find $ANDROID_SDK_ROOT/ndk -maxdepth 1 -type d -name "26*" | head -n 1)
          
          if [ -z "$NDK_PATH" ]; then
            echo "错误: 未能定位到 NDK 安装目录"
            exit 1
          fi
          
          # 2. 定位交叉编译器 (aarch64 适用于主流安卓车机/手机)
          CLANG_PATH="$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android30-clang"
          
          if [ ! -f "$CLANG_PATH" ]; then
             echo "错误: 找不到编译器 $CLANG_PATH"
             exit 1
          fi
          
          export CC="$CLANG_PATH"
          echo "使用编译器: $CC"

          # 3. 开始编译
          make clean
          # STATIC=1 确保生成的是静态链接库，不依赖 Android 系统的 .so 文件，兼容性最高
          # -j$(nproc) 利用多核加速编译
          make CC="$CC" STATIC=1 -j$(nproc)

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: stress-ng-android-aarch64
          # stress-ng 编译出的二进制文件名就是 stress-ng
          path: stress-ng
